          left: 0;
          width: 100%;
          height: 100%;
          object-fit: contain;
          padding: 15px;
          box-sizing: border-box;
          background-color: white;
        }
        /* Both images run the same 6s animation, but one is delayed by 3s */
        #slide1 { animation: crossFade 6s infinite; }
